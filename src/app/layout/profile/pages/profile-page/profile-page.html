<section class="profile-page">
  <div class="header">
    <div class="header-top">
      <button class="back-button" type="button" (click)="goBack()" mat-stroked-button>
        <mat-icon>arrow_back</mat-icon>
        <span>Voltar</span>
      </button>

      <button class="settings-button" type="button" (click)="openSettingsModal()" mat-stroked-button>
        <mat-icon>settings</mat-icon>
        <span>Configurações</span>
      </button>
    </div>

    <h1>Meu Perfil</h1>
    <p>Atualize suas informações profissionais, skills, experiências, certificações e projetos.</p>
  </div>

  <p *ngIf="loading">Carregando perfil...</p>

  <form *ngIf="!loading" [formGroup]="profileForm" class="profile-form">
    <div class="card">
      <h2>Informações principais</h2>

      <label>
        Resumo profissional
        <textarea formControlName="resumoProfissional" rows="5"></textarea>
      </label>

      <div class="grid-2">
        <label>
          Cidade
          <input type="text" formControlName="cidade" />
        </label>

        <label>
          Estado
          <input type="text" formControlName="estado" />
        </label>
      </div>

      <div class="grid-2">
        <label>
          LinkedIn
          <input type="text" formControlName="linkedinUrl" />
        </label>

        <label>
          GitHub
          <input type="text" formControlName="githubUrl" />
        </label>
      </div>
    </div>

    <div class="card">
      <div class="section-title">
        <h2>Skills</h2>

        <button mat-raised-button color="primary" type="button" (click)="addSkill()">
          <mat-icon>add</mat-icon>
          Adicionar
        </button>
      </div>

      <div formArrayName="skills">
        <div class="item-row" *ngFor="let skill of skills.controls; let i = index">
          <input type="text" [formControlName]="i" placeholder="Ex: Java" />

          <button mat-stroked-button color="warn" type="button" (click)="removeSkill(i)">
            <mat-icon>delete</mat-icon>
            Remover
          </button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">
        <h2>Experiências</h2>

        <button mat-raised-button color="primary" type="button" (click)="addExperience()">
          <mat-icon>add</mat-icon>
          Adicionar
        </button>
      </div>

      <div formArrayName="experiences">
        <div
          class="group-box"
          *ngFor="let experience of experiences.controls; let i = index"
          [formGroupName]="i"
        >
          <div class="grid-2">
            <label>
              Cargo
              <input type="text" formControlName="cargo" />
            </label>

            <label>
              Empresa
              <input type="text" formControlName="empresa" />
            </label>
          </div>

          <label>
            Descrição
            <textarea rows="4" formControlName="descricao"></textarea>
          </label>

          <div class="grid-2">
            <label>
              Data início
              <input type="month" formControlName="dataInicio" />
            </label>

            <label>
              Data fim
              <input type="month" formControlName="dataFim" />
            </label>
          </div>

          <button mat-stroked-button color="warn" type="button" (click)="removeExperience(i)">
            <mat-icon>delete</mat-icon>
            Remover
          </button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">
        <h2>Certificações</h2>

        <button mat-raised-button color="primary" type="button" (click)="addCertification()">
          <mat-icon>add</mat-icon>
          Adicionar
        </button>
      </div>

      <div formArrayName="certifications">
        <div
          class="group-box"
          *ngFor="let certification of certifications.controls; let i = index"
          [formGroupName]="i"
        >
          <div class="grid-2">
            <label>
              Nome da certificação
              <input type="text" formControlName="nomeCertificacao" />
            </label>

            <label>
              Instituição
              <input type="text" formControlName="instituicao" />
            </label>
          </div>

          <label>
            Data de obtenção
            <input type="month" formControlName="dataObtencao" />
          </label>

          <button mat-stroked-button color="warn" type="button" (click)="removeCertification(i)">
            <mat-icon>delete</mat-icon>
            Remover
          </button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">
        <h2>Projetos</h2>

        <div class="project-actions">
          <button type="button" class="github-sync-button" (click)="openGithubSyncModal()">
            <svg viewBox="0 0 24 24" aria-hidden="true" class="github-icon">
              <path
                fill="currentColor"
                d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.57.1.78-.25.78-.56v-2.17c-3.2.7-3.88-1.36-3.88-1.36-.52-1.33-1.28-1.68-1.28-1.68-1.05-.72.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.03 1.76 2.7 1.25 3.36.95.1-.75.4-1.25.72-1.54-2.56-.29-5.25-1.28-5.25-5.69 0-1.26.45-2.29 1.18-3.09-.12-.29-.51-1.47.11-3.06 0 0 .97-.31 3.17 1.18a11 11 0 0 1 5.77 0c2.19-1.49 3.16-1.18 3.16-1.18.63 1.59.24 2.77.12 3.06.74.8 1.18 1.83 1.18 3.09 0 4.42-2.69 5.39-5.26 5.67.41.35.77 1.04.77 2.11v3.13c0 .31.21.67.79.56A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"
              />
            </svg>
            <span>Sincronizar GitHub</span>
          </button>

          <button mat-raised-button color="primary" type="button" (click)="addProject()">
            <mat-icon>add</mat-icon>
            Adicionar
          </button>
        </div>
      </div>

      <div formArrayName="projects">
        <div
          class="group-box"
          *ngFor="let project of projects.controls; let i = index"
          [formGroupName]="i"
        >
          <label>
            Nome
            <input type="text" formControlName="nome" />
          </label>

          <label>
            Descrição
            <textarea rows="4" formControlName="descricao"></textarea>
          </label>

          <div class="grid-2">
            <label>
              Stack
              <input type="text" formControlName="stack" />
            </label>

            <label>
              Link
              <input type="text" formControlName="link" />
            </label>
          </div>
        </div>
      </div>
    </div>

    <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>
    <p *ngIf="successMessage" class="success">{{ successMessage }}</p>

    <div class="actions">
      <button
        *ngIf="projects.controls.length > 0"
        mat-stroked-button
        color="warn"
        type="button"
        (click)="removeProject(projects.controls.length - 1)"
      >
        <mat-icon>delete</mat-icon>
        Remover projeto
      </button>

      <button
        mat-raised-button
        color="primary"
        type="button"
        (click)="saveAll()"
        [disabled]="saving"
      >
        <mat-icon>save</mat-icon>
        {{ saving ? 'Salvando...' : 'Salvar perfil' }}
      </button>
    </div>
  </form>

  <app-confirmation-modal
    [isOpen]="githubSyncModalOpen"
    [loading]="syncingGithubProjects"
    title="Sincronizar projetos com GitHub?"
    description="Os projetos atuais serão substituídos pelos repositórios públicos encontrados no GitHub salvo no seu perfil."
    details="Se você adicionou algum projeto manualmente e ele não existir no seu GitHub, será necessário adicioná-lo manualmente novamente depois da sincronização."
    confirmLabel="Sincronizar agora"
    cancelLabel="Cancelar"
    (close)="closeGithubSyncModal()"
    (confirm)="syncGithubProjects()"
  ></app-confirmation-modal>

  <app-settings-modal
    [isOpen]="settingsModalOpen"
    [language]="appLanguage"
    [theme]="appTheme"
    [termsAccepted]="termsAccepted"
    [openAiApiKey]="openAiApiKey"
    [jsearchApiKey]="jsearchApiKey"
    (close)="closeSettingsModal()"
    (save)="saveSettings($event)"
  ></app-settings-modal>
</section>
