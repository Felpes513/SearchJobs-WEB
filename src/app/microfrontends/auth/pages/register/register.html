<div class="register-page">
  <div class="register-card">
    <div class="register-header">
      <h1>Criar conta</h1>
      <p>Preencha os dados para se cadastrar no SearchJobs.</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
      <div class="form-group">
        <label for="nome">Nome</label>
        <input
          id="nome"
          type="text"
          formControlName="nome"
          placeholder="Digite seu nome"
        />
        <small *ngIf="campoInvalido('nome')">
          O nome é obrigatório.
        </small>
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="Digite seu e-mail"
        />
        <small *ngIf="campoInvalido('email')">
          Informe um e-mail válido.
        </small>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input
          id="senha"
          type="password"
          formControlName="senha"
          placeholder="Digite sua senha"
        />
        <small *ngIf="campoInvalido('senha')">
          A senha deve ter no mínimo 6 caracteres.
        </small>
      </div>

      <div *ngIf="mensagemErro" class="message error">
        {{ mensagemErro }}
      </div>

      <div *ngIf="mensagemSucesso" class="message success">
        {{ mensagemSucesso }}
      </div>

      <div class="actions">
        <button type="submit" class="btn-primary" [disabled]="carregando">
          {{ carregando ? 'Cadastrando...' : 'Cadastrar' }}
        </button>

        <button type="button" class="btn-secondary" routerLink="/login">
          Voltar para login
        </button>
      </div>
    </form>
  </div>
</div>
